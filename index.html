<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundboard CRM</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const STORAGE_KEY = "soundboard_crm_v3";

    const MY_SPOTS = [
      { brand: "Cheerios", spot: "Good Goes Round", type: "TV", music: "Original brand anthem", industries: ["food","cpg","cereal"] },
      { brand: "Disney", spot: "DJ-R3X", type: "Experiential", music: "Original sci-fi cantina music", industries: ["entertainment","disney"] },
      { brand: "BMW", spot: "Heritage", type: "TV", music: "Cinematic custom composition", industries: ["automotive"] },
      { brand: "Lexus IS", spot: "All In More", type: "TV", music: "Performance custom composition", industries: ["automotive"] },
      { brand: "Netflix", spot: "Kipo", type: "Animation", music: "Adventurous custom composition", industries: ["streaming","animation"] }
    ];

    const MY_PORTFOLIO_TEXT = MY_SPOTS.map(s => `• ${s.brand}: ${s.music}`).join("\n");

    const VIEWS = { SETUP:"setup", DASHBOARD:"dashboard", SEARCH:"search", PROSPECT:"prospect", COMPOSE:"compose" };

    async function storageGet(key) {
      try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch { return null; }
    }
    async function storageSet(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }

    const defaultProfile = { name:"", duo:"", emailStyle:"personal and direct" };
    const defaultState = { profile:defaultProfile, prospects:[], setupDone:false };

    // ─── THE FIXED API CALL ──────────────────────────────────────────────────
    async function callClaude(messages, system) {
      const lastMsg = messages[messages.length - 1];
      const userContent = typeof lastMsg.content === 'string' ? lastMsg.content : lastMsg.content[0].text;

      try {
        const res = await fetch("https://soundboard-backend-final.onrender.com/api/chat", {
          method: "POST", 
          headers: { "Content-Type": "application/json" }, 
          body: JSON.stringify({ message: userContent })
        });
        
        const data = await res.json();
        const reply = data.reply || "";

        // Important: Remove AI markdown if it exists so JSON.parse doesn't break
        return reply.replace(/```json|```/g, "").trim();
      } catch (error) {
        console.error("API Error:", error);
        return "ERROR";
      }
    }

    function buildContext(profile) {
      return `You are a music industry assistant for ${profile.duo || "BrewHouse"}. Portfolio:\n${MY_PORTFOLIO_TEXT}`;
    }

    const S = {
      input: { width:"100%", border:"2px solid #e5e7eb", borderRadius:8, padding:"10px 14px", marginBottom:10 },
      primary: { background:"#4f46e5", color:"#fff", border:"none", borderRadius:8, padding:"11px 22px", fontWeight:700, cursor:"pointer" },
      ghost: { background:"#fff", border:"2px solid #e5e7eb", borderRadius:8, padding:"9px 16px", cursor:"pointer" }
    };

    // ─── Research Panel (The Insights Box) ───────────────────────────────────
    function ResearchPanel({ prospect }) {
      const [status, setStatus] = useState("loading"); 
      const [insights, setInsights] = useState(null);

      useEffect(() => {
        const run = async () => {
          const prompt = `Research ${prospect.name}. Find 2 recent ad campaigns they produced. Output ONLY JSON: {"spots": [{"brand":"", "desc":""}]}`;
          const res = await callClaude([{role:"user", content:prompt}], "Searcher");
          try {
            setInsights(JSON.parse(res));
            setStatus("done");
          } catch { setStatus("none"); }
        };
        run();
      }, [prospect.name]);

      if (status === "loading") return <div style={{padding:15, color:"#666"}}>🔍 Finding insights for {prospect.name}...</div>;
      
      return (
        <div style={{ background:"#f0fdf4", border:"1px solid #86efac", borderRadius:10, padding:15, marginBottom:20 }}>
          <h4 style={{ color:"#15803d", marginBottom:10, fontSize:12 }}>AI INSIGHTS & RECENT WORK</h4>
          {insights?.spots?.map((s, i) => (
            <div key={i} style={{fontSize:13, marginBottom:8}}>
              <strong>{s.brand}</strong>: {s.desc}
            </div>
          ))}
        </div>
      );
    }

    function SetupView({ profile, onSave }) {
      const [p,setP] = useState(profile);
      return (
        <div style={{ maxWidth:400, margin:"100px auto", textAlign:"center" }}>
          <h2>Welcome to Soundboard</h2>
          <input style={S.input} value={p.name} onChange={e=>setP({...p,name:e.target.value})} placeholder="Your Name"/>
          <input style={S.input} value={p.duo} onChange={e=>setP({...p,duo:e.target.value})} placeholder="Duo Name"/>
          <button onClick={()=>onSave(p)} style={S.primary}>Get Started</button>
        </div>
      );
    }

    function DashboardView({ prospects, profile, onSearch, onSelect }) {
      return (
        <div style={{ padding:40, maxWidth:800, margin:"0 auto" }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:40 }}>
            <h1>Hey {profile.name} 👋</h1>
            <button onClick={onSearch} style={S.primary}>+ Find Clients</button>
          </div>
          {prospects.map(p => (
            <div key={p.id} onClick={()=>onSelect(p)} style={{ background:"#fff", padding:20, borderRadius:12, border:"1px solid #e5e7eb", marginBottom:10, cursor:"pointer" }}>
              <strong>{p.name}</strong> — <span style={{color:"#666"}}>{p.location}</span>
            </div>
          ))}
        </div>
      );
    }

    function SearchView({ profile, onBack, onAdd }) {
      const [q,setQ] = useState("");
      const [loading,setLoading] = useState(false);
      const [results,setResults] = useState([]);

      const handleSearch = async () => {
        setLoading(true);
        const prompt = `Find 5 ad agencies or music houses in ${q}. Return ONLY JSON: [{"name":"","location":"","relevance":""}]`;
        const res = await callClaude([{role:"user", content:prompt}], "Business scout");
        try { setResults(JSON.parse(res)); } catch {}
        setLoading(false);
      };

      return (
        <div style={{ padding:40, maxWidth:600, margin:"0 auto" }}>
          <button onClick={onBack} style={S.ghost}>Back</button>
          <div style={{ display:"flex", gap:10, margin:"20px 0" }}>
            <input style={S.input} value={q} onChange={e=>setQ(e.target.value)} placeholder="City or Industry..."/>
            <button onClick={handleSearch} style={S.primary}>{loading ? "..." : "Search"}</button>
          </div>
          {results.map((r,i) => (
            <div key={i} style={{ background:"#fff", padding:15, borderRadius:8, marginBottom:10, border:"1px solid #e5e7eb" }}>
              <strong>{r.name}</strong> ({r.location})
              <p style={{fontSize:12, color:"#666", margin:"5px 0"}}>{r.relevance}</p>
              <button onClick={()=>onAdd({...r, id:Date.now()+i})} style={{color:"#4f46e5", background:"none", border:"none", cursor:"pointer", padding:0, fontWeight:700}}>+ Add to CRM</button>
            </div>
          ))}
        </div>
      );
    }

    function ProspectView({ prospect, onBack, onCompose }) {
      return (
        <div style={{ padding:40, maxWidth:600, margin:"0 auto" }}>
          <button onClick={onBack} style={S.ghost}>Back</button>
          <h1 style={{margin:"20px 0"}}>{prospect.name}</h1>
          <ResearchPanel prospect={prospect} />
          <button onClick={onCompose} style={S.primary}>Write Outreach Email</button>
        </div>
      );
    }

    function ComposeView({ prospect, profile, onBack }) {
      const [mail, setMail] = useState("");
      useEffect(() => {
        const run = async () => {
          const res = await callClaude([{role:"user", content:`Write a short email to ${prospect.name}.`}], buildContext(profile));
          setMail(res);
        };
        run();
      }, []);
      return (
        <div style={{ padding:40, maxWidth:600, margin:"0 auto" }}>
          <button onClick={onBack} style={S.ghost}>Back</button>
          <h2 style={{margin:"20px 0"}}>Draft for {prospect.name}</h2>
          <textarea style={{...S.input, minHeight:300}} value={mail} onChange={e=>setMail(e.target.value)} />
        </div>
      );
    }

    function App() {
      const [state,setState] = useState(null);
      const [view,setView] = useState(VIEWS.DASHBOARD);
      const [sel,setSel] = useState(null);

      useEffect(() => {
        storageGet(STORAGE_KEY).then(s => {
          setState(s || defaultState);
          if(!s?.setupDone) setView(VIEWS.SETUP);
        });
      }, []);

      const save = (next) => { setState(next); storageSet(STORAGE_KEY, next); };

      if(!state) return null;

      return (
        <div style={{ minHeight:"100vh", background:"#f9fafb", fontFamily:"sans-serif" }}>
          {view===VIEWS.SETUP && <SetupView profile={state.profile} onSave={p=> {save({...state, profile:p, setupDone:true}); setView(VIEWS.DASHBOARD);}}/>}
          {view===VIEWS.DASHBOARD && <DashboardView profile={state.profile} prospects={state.prospects} onSearch={()=>setView(VIEWS.SEARCH)} onSelect={p=>{setSel(p); setView(VIEWS.PROSPECT);}}/>}
          {view===VIEWS.SEARCH && <SearchView onBack={()=>setView(VIEWS.DASHBOARD)} onAdd={p=>{save({...state, prospects:[...state.prospects, p]}); setView(VIEWS.DASHBOARD);}}/>}
          {view===VIEWS.PROSPECT && <ProspectView prospect={sel} onBack={()=>setView(VIEWS.DASHBOARD)} onCompose={()=>setView(VIEWS.COMPOSE)}/>}
          {view===VIEWS.COMPOSE && <ComposeView prospect={sel} profile={state.profile} onBack={()=>setView(VIEWS.PROSPECT)}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
