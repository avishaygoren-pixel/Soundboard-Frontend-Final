</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const STORAGE_KEY = "soundboard_crm_v3";

    // ─── Verified BrewHouse Portfolio ───────────────────────────────────────────
    const MY_SPOTS = [
      { brand: "Cheerios", spot: "Good Goes Round", type: "TV", agency: "72andSunny NY", awards: "2018 Clio Music Bronze", music: "Original brand anthem / upbeat jingle", link: "https://www.adsoftheworld.com/campaigns/good-goes-round", industries: ["food","cpg","family","fmcg","cereal"] },

      { brand: "BMW", spot: "Heritage", type: "TV / Digital", music: "Cinematic/heritage custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["automotive","luxury","german","car"] },
      { brand: "Lexus IS", spot: "All In More", type: "TV / Digital", music: "Dynamic/performance custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["automotive","luxury","japanese","car"] },
      { brand: "Ford", spot: "Built to Lend a Hand", type: "TV", music: "Americana/heartland custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["automotive","american","trucks","car"] },
      { brand: "Airbnb", spot: "Breaking Down Walls", type: "Digital / Social", music: "Warm/inclusive/global custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["travel","tech","hospitality","sharing"] },
      { brand: "Netflix", spot: "Kipo and the Age of Wonderbeasts", type: "Streaming / Trailer", music: "Animated/adventurous custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["streaming","entertainment","animation","youth","netflix"] },
      { brand: "Marvel Avengers", spot: "Bend And Flex", type: "TV / Digital", music: "Superhero/action custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["entertainment","toys","gaming","action","marvel"] },
      { brand: "Jack Daniels", spot: "JDFlavers", type: "Digital / Social", music: "Blues/americana whiskey mood", link: "https://www.brewhousemusic.com/projects", industries: ["alcohol","spirits","cpg","lifestyle","whiskey"] },
      { brand: "AXE", spot: "Gold", type: "TV / Digital", music: "Confident/masculine/stylish custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["personal care","beauty","cpg","male grooming","unilever"] },
      { brand: "Carhartt", spot: "Fit For The Next Frontier", type: "TV / Digital", music: "Rugged/americana/workwear custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["fashion","apparel","outdoor","workwear"] },
      { brand: "Diesel", spot: "Make Love No Walls", type: "TV / Digital", music: "Edgy/fashion-forward/bold custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["fashion","luxury","apparel","lifestyle","european"] },
      { brand: "Wendy's", spot: "Fries with That + BaconFest", type: "TV", music: "Playful jingle / QSR feel", link: "https://www.brewhousemusic.com/projects", industries: ["qsr","fast food","food","restaurant"] },
      { brand: "HP", spot: "Reverb G2 VR + ZBook", type: "Digital / Tech", music: "Tech/futuristic/innovation custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["tech","b2b","hardware","vr","innovation"] },
      { brand: "Fireball Whisky", spot: "Fireball Campaign", type: "Digital / Social", music: "Fun/party/bold custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["alcohol","spirits","lifestyle","party"] },
      { brand: "Famous Footwear", spot: "Back to School", type: "TV / Digital", music: "Upbeat/youthful/seasonal custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["retail","fashion","footwear"] },
      { brand: "KFC", spot: "Cafe'", type: "TV / Digital", music: "Warm/cafe/lifestyle custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["qsr","fast food","food","coffee","restaurant"] },
      { brand: "Nerf Elite", spot: "Flipshots", type: "TV / Digital", music: "Action/kids/energetic custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["toys","kids","action","retail","hasbro"] },
      { brand: "Herradura Ultra", spot: "Sound of Smoothness", type: "TV / Digital", music: "Smooth/luxury tequila mood", link: "https://www.brewhousemusic.com/projects", industries: ["alcohol","spirits","luxury","tequila"] },
      { brand: "CVS", spot: "Fold It The Right Way", type: "TV", music: "Caring/warm/health custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["pharmacy","health","retail","cpg"] },
      { brand: "Sunkist", spot: "Citrus Campaign", type: "TV / Digital", music: "Sunny/fresh/summery custom composition", link: "https://www.brewhousemusic.com/projects", industries: ["food","beverage","cpg","fruit"] }
    ];

    const MY_PORTFOLIO_TEXT = MY_SPOTS.map(s =>
      `• ${s.brand} — "${s.spot}" (${s.type}) | Music: ${s.music} | Industries: ${s.industries.join(", ")}`
    ).join("\n");

    const VIEWS = { SETUP:"setup", DASHBOARD:"dashboard", SEARCH:"search", PROSPECT:"prospect", COMPOSE:"compose" };
    const STATUSES = ["New","Emailed","Replied","Meeting","Closed","Pass"];
    const STATUS_COLORS = { New:"#4f46e5", Emailed:"#d97706", Replied:"#059669", Meeting:"#2563eb", Closed:"#7c3aed", Pass:"#6b7280" };

    // ─── Standard Browser Local Storage ──────────────────────────────────
    async function storageGet(key) {
      try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch { return null; }
    }
    async function storageSet(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }

    const defaultProfile = { name:"", duo:"", markets:[], targetTypes:[], musicTypes:[], pastClients:"", reel:"", emailStyle:"" };
    const defaultState   = { profile:defaultProfile, prospects:[], setupDone:false };

    // ─── NEW SECURE API CALL ──────────────────────────────────────────────────
    async function callClaude(messages, system, useWebSearch = false) {
      try {
        const msgsText = messages.map(m => `${m.role.toUpperCase()}: ${m.content}`).join("\n");
        const prompt = system ? `SYSTEM: ${system}\n\n${msgsText}` : msgsText;

        const res = await fetch("https://soundboard-backend-final.onrender.com/api/chat", {
          method: "POST", 
          headers: { "Content-Type": "application/json" }, 
          body: JSON.stringify({ message: prompt })
        });
        
        const data = await res.json();
        return (data.reply || "").replace(/```json/gi, "").replace(/```/g, "").trim();
      } catch (error) {
        console.error("API Error:", error);
        alert("The API connection failed.");
        return "";
      }
    }

    function buildContext(profile) {
      return `You are an outreach assistant for a music duo called ${profile.duo||"BrewHouse Music / Mighty Music"} (contact: ${profile.name||"the composer"}).
THEIR VERIFIED PORTFOLIO:
${MY_PORTFOLIO_TEXT}
Markets: ${profile.markets.join(", ")}. Targets: ${profile.targetTypes.join(", ")}. Style: ${profile.musicTypes.join(", ")}. Extra clients: ${profile.pastClients||"none"}. Email style: ${profile.emailStyle||"personal, direct, no fluff"}.`;
    }

    // ─── Styles ──────────────────────────────────────────────────────────────────
    const S = {
      label:   { fontSize:12, fontWeight:700, color:"#374151", letterSpacing:"0.06em", textTransform:"uppercase", display:"block", marginBottom:6 },
      input:   { width:"100%", background:"#fff", border:"2px solid #e5e7eb", borderRadius:8, padding:"10px 14px", color:"#111", fontSize:14, fontFamily:"inherit", outline:"none", boxSizing:"border-box" },
      primary: { background:"#4f46e5", color:"#fff", border:"none", borderRadius:8, padding:"11px 22px", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap" },
      ghost:   { background:"#fff", color:"#374151", border:"2px solid #e5e7eb", borderRadius:8, padding:"9px 16px", fontSize:13, cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap", fontWeight:500 },
    };

    function Chip({ label, active, onClick }) {
      return <button onClick={onClick} style={{ padding:"7px 16px", borderRadius:999, fontSize:13, cursor:"pointer", background:active?"#4f46e5":"#fff", color:active?"#fff":"#555", border:active?"2px solid #4f46e5":"2px solid #e5e7eb", fontFamily:"inherit", fontWeight:active?600:400 }}>{label}</button>;
    }
    function StatusBadge({ status }) {
      return <span style={{ padding:"3px 10px", borderRadius:999, fontSize:11, fontWeight:700, background:STATUS_COLORS[status]+"18", color:STATUS_COLORS[status], border:`1.5px solid ${STATUS_COLORS[status]}40` }}>{status}</span>;
    }

    // ─── Research Panel ──────────────────────────────────────────────────────────
    function ResearchPanel({ prospect, profile }) {
      const [status, setStatus] = useState("idle"); 
      const [spots, setSpots]   = useState(prospect.researchedSpots || null);
      const [overlap, setOverlap] = useState(prospect.researchedOverlap || null);

      const research = async () => {
        setStatus("loading");
        try {
          const system = `You are a music industry researcher. Output ONLY a JSON object with this exact shape: { "spots": [{ "brand": "", "spotName": "", "type": "", "year": 2023, "description": "", "videoUrl": "", "sourceUrl": "" }], "overlap": [{ "theirBrand": "", "ourSpot": "", "ourBrand": "", "angle": "" }] }
Our verified past work for overlap matching:\n${MY_PORTFOLIO_TEXT}`;

          const text = await callClaude(
            [{ role:"user", content:`Research the portfolio and client work of "${prospect.name}" at ${prospect.website}. Find their real spots, campaigns, and clients. Then identify overlaps with our past work.` }],
            system,
            true 
          );

          const parsed = JSON.parse(text);
          setSpots(parsed.spots || []);
          setOverlap(parsed.overlap || []);
          setStatus("done");
          return { spots: parsed.spots || [], overlap: parsed.overlap || [] };
        } catch(e) {
          console.error(e);
          setStatus("error");
          return null;
        }
      };

      useEffect(() => { if (!spots) research(); }, []);

      if (status === "loading" || (status === "idle" && !spots)) return (
        <div style={{ background:"#eff6ff", border:"1.5px solid #93c5fd", borderRadius:10, padding:"20px 18px", marginBottom:14 }}>
          <div style={{ fontSize:11, color:"#2563eb", fontWeight:700, letterSpacing:"0.08em", marginBottom:10 }}>RESEARCHING THEIR WORK...</div>
          <div style={{ display:"flex", alignItems:"center", gap:10, color:"#6b7280", fontSize:13 }}>
            <span style={{ animation:"spin 1s linear infinite", display:"inline-block" }}>🔍</span> Searching the web...
          </div>
          <style>{`@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }`}</style>
        </div>
      );

      if (status === "error") return (
        <div style={{ background:"#fef2f2", border:"1.5px solid #fca5a5", borderRadius:10, padding:"14px 18px", marginBottom:14 }}>
          <div style={{ fontSize:11, color:"#dc2626", fontWeight:700, marginBottom:6 }}>RESEARCH FAILED</div>
          <button onClick={research} style={{ ...S.ghost, fontSize:12 }}>↺ Try again</button>
        </div>
      );

      return (
        <div style={{ marginBottom:14 }}>
          <div style={{ background:"#f0fdf4", border:"1.5px solid #86efac", borderRadius:10, padding:"14px 18px", marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <div style={{ fontSize:11, color:"#15803d", fontWeight:700, letterSpacing:"0.08em" }}>{prospect.name.toUpperCase()} — REAL WORK FOUND</div>
              <button onClick={research} style={{ fontSize:11, color:"#6b7280", background:"transparent", border:"1px solid #e5e7eb", borderRadius:6, padding:"3px 8px", cursor:"pointer", fontFamily:"inherit" }}>↺ Refresh</button>
            </div>
            {spots?.length === 0 && <p style={{ fontSize:13, color:"#9ca3af" }}>No specific spots found.</p>}
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {spots?.map((s, i) => (
                <div key={i} style={{ background:"#fff", border:"1px solid #bbf7d0", borderRadius:8, padding:"12px 14px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, marginBottom:6 }}>
                    <div><span style={{ fontWeight:700, color:"#166534", fontSize:14 }}>{s.brand}</span>{s.spotName && <span style={{ color:"#16a34a", fontSize:13 }}> — "{s.spotName}"</span>}</div>
                  </div>
                  {s.description && <p style={{ fontSize:13, color:"#4b5563", lineHeight:1.5, marginBottom:8 }}>{s.description}</p>}
                </div>
              ))}
            </div>
          </div>
          {overlap?.length > 0 && (
            <div style={{ background:"#eff6ff", border:"1.5px solid #93c5fd", borderRadius:10, padding:"14px 18px" }}>
              <div style={{ fontSize:11, color:"#2563eb", fontWeight:700, letterSpacing:"0.08em", marginBottom:12 }}>🔗 CONNECTION TO YOUR WORK</div>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {overlap.map((o, i) => (
                  <div key={i} style={{ background:"#fff", border:"1px solid #bfdbfe", borderRadius:8, padding:"10px 14px" }}>
                    <p style={{ fontSize:13, color:"#374151", lineHeight:1.5 }}><strong>{o.ourBrand}:</strong> {o.angle}</p>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── AI Chat ─────────────────────────────────────────────────────────────────
    function ChatAssistant({ profile, prospect }) {
      const [open, setOpen]       = useState(false);
      const [messages, setMessages] = useState([]);
      const [input, setInput]     = useState("");
      const [loading, setLoading] = useState(false);
      const bottomRef             = useRef(null);

      useEffect(() => { if(open && bottomRef.current) bottomRef.current.scrollIntoView({behavior:"smooth"}); }, [messages,open]);

      const send = async () => {
        if(!input.trim()||loading) return;
        const userMsg = {role:"user", content:input};
        setMessages(prev=>[...prev,userMsg]); setInput(""); setLoading(true);
        const system = `${buildContext(profile)}${prospect?`\nCurrent prospect: ${prospect.name} (${prospect.type}, ${prospect.location}).`:""}\nBe concise.`;
        const reply = await callClaude([...messages,userMsg].map(m=>({role:m.role,content:m.content})), system, true);
        setMessages(prev=>[...prev,{role:"assistant",content:reply}]);
        setLoading(false);
      };

      return (
        <>
          <button onClick={()=>setOpen(o=>!o)} style={{ position:"fixed", bottom:24, right:24, width:52, height:52, borderRadius:999, background:"#4f46e5", border:"none", cursor:"pointer", boxShadow:"0 4px 16px rgba(79,70,229,0.35)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>
            {open ? <span style={{color:"#fff",fontWeight:700,fontSize:20}}>×</span> : "💬"}
          </button>
          {open && (
            <div style={{ position:"fixed", bottom:90, right:24, width:340, maxHeight:480, background:"#fff", border:"2px solid #e5e7eb", borderRadius:16, boxShadow:"0 8px 32px rgba(0,0,0,0.12)", zIndex:100, display:"flex", flexDirection:"column", overflow:"hidden" }}>
              <div style={{ padding:"14px 18px", borderBottom:"1.5px solid #f3f4f6", background:"#f9fafb" }}>
                <div style={{ fontWeight:700, fontSize:14, color:"#111" }}>AI Assistant</div>
              </div>
              <div style={{ flex:1, overflowY:"auto", padding:"12px 14px", display:"flex", flexDirection:"column", gap:10 }}>
                {messages.length===0 && <div style={{ color:"#9ca3af", fontSize:13, textAlign:"center", marginTop:20 }}>Ask about strategy or emails.</div>}
                {messages.map((m,i)=>(
                  <div key={i} style={{ alignSelf:m.role==="user"?"flex-end":"flex-start", maxWidth:"85%", background:m.role==="user"?"#4f46e5":"#f3f4f6", color:m.role==="user"?"#fff":"#111", padding:"9px 13px", borderRadius:m.role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px", fontSize:13, lineHeight:1.5 }}>
                    {m.content}
                  </div>
                ))}
                {loading && <div style={{ alignSelf:"flex-start", background:"#f3f4f6", padding:"9px 13px", borderRadius:"12px 12px 12px 4px", fontSize:13, color:"#9ca3af" }}>Thinking...</div>}
                <div ref={bottomRef}/>
              </div>
              <div style={{ padding:"10px 12px", borderTop:"1.5px solid #f3f4f6", display:"flex", gap:8 }}>
                <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} style={{...S.input, padding:"8px 12px", fontSize:13, flex:1}} placeholder="Ask anything..."/>
                <button onClick={send} disabled={loading} style={{...S.primary, padding:"8px 14px", fontSize:13}}>↑</button>
              </div>
            </div>
          )}
        </>
      );
    }

    // ─── Setup ───────────────────────────────────────────────────────────────────
    function SetupView({ profile, onSave }) {
      const [p,setP] = useState(profile);
      const toggle = (f,v) => setP(prev=>({...prev,[f]:prev[f].includes(v)?prev[f].filter(x=>x!==v):[...prev[f],v]}));
      return (
        <div style={{ maxWidth:560, margin:"0 auto", padding:"48px 24px" }}>
          <div style={{ marginBottom:36 }}>
            <div style={{ fontSize:11, color:"#4f46e5", fontWeight:800, letterSpacing:"0.15em", marginBottom:8 }}>SETUP</div>
            <h1 style={{ fontSize:30, fontWeight:800, color:"#111" }}>Tell us about your duo</h1>
            <p style={{ color:"#6b7280", marginTop:8, fontSize:14 }}>Powers the AI for finding clients and writing emails.</p>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:24 }}>
            <div><label style={S.label}>Your name</label><input style={S.input} value={p.name} onChange={e=>setP({...p,name:e.target.value})} placeholder="e.g. Alex"/></div>
            <div><label style={S.label}>Duo / project name</label><input style={S.input} value={p.duo} onChange={e=>setP({...p,duo:e.target.value})} placeholder="e.g. BrewHouse Music"/></div>
            <div><label style={S.label}>Markets</label><div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>{["USA","Europe","Global","Israel"].map(m=><Chip key={m} label={m} active={p.markets.includes(m)} onClick={()=>toggle("markets",m)}/>)}</div></div>
            <div><label style={S.label}>Target client types</label><div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>{["Music Houses","Ad Agencies","Brands Direct"].map(m=><Chip key={m} label={m} active={p.targetTypes.includes(m)} onClick={()=>toggle("targetTypes",m)}/>)}</div></div>
            <div><label style={S.label}>Music style</label><div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>{["Jingles & Branding","Background / Soundscape","Both"].map(m=><Chip key={m} label={m} active={p.musicTypes.includes(m)} onClick={()=>toggle("musicTypes",m)}/>)}</div></div>
            <div><label style={S.label}>Additional past clients</label><input style={S.input} value={p.pastClients} onChange={e=>setP({...p,pastClients:e.target.value})} placeholder="e.g. Nike, Apple..."/></div>
            <div><label style={S.label}>Email writing style</label><input style={S.input} value={p.emailStyle} onChange={e=>setP({...p,emailStyle:e.target.value})} placeholder='e.g. "Short and punchy"'/></div>
            <button onClick={()=>onSave(p)} style={{...S.primary,padding:"13px 24px",fontSize:15}}>Save & start →</button>
          </div>
        </div>
      );
    }

    // ─── Dashboard ───────────────────────────────────────────────────────────────
    function DashboardView({ prospects, profile, onSearch, onSelectProspect, onEditProfile }) {
      const byStatus = STATUSES.reduce((a,s)=>({...a,[s]:prospects.filter(p=>p.status===s).length}),{});
      const active   = prospects.filter(p=>!["Closed","Pass"].includes(p.status));
      return (
        <div style={{ padding:"32px 24px", maxWidth:860, margin:"0 auto" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:32 }}>
            <div>
              <div style={{ fontSize:11, color:"#4f46e5", fontWeight:800, letterSpacing:"0.15em", marginBottom:6 }}>DASHBOARD</div>
              <h2 style={{ fontSize:26, fontWeight:800, color:"#111" }}>Hey {profile.name||"there"} 👋</h2>
              <p style={{ color:"#6b7280", fontSize:14, marginTop:4 }}>{active.length} active · {prospects.length} total prospects</p>
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={onEditProfile} style={S.ghost}>Edit profile</button>
              <button onClick={onSearch} style={S.primary}>+ Find clients</button>
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:12, marginBottom:32 }}>
            {["New","Emailed","Replied"].map(s=>(
              <div key={s} style={{ background:"#fff", border:"2px solid #e5e7eb", borderRadius:12, padding:"16px 20px" }}>
                <div style={{ fontSize:11, color:"#9ca3af", fontWeight:700, letterSpacing:"0.1em", marginBottom:6 }}>{s.toUpperCase()}</div>
                <div style={{ fontSize:30, fontWeight:800, color:STATUS_COLORS[s] }}>{byStatus[s]||0}</div>
              </div>
            ))}
          </div>
          {prospects.length===0 ? (
            <div style={{ textAlign:"center", padding:"60px 0", background:"#fff", borderRadius:16, border:"2px dashed #e5e7eb" }}>
              <div style={{ fontSize:40, marginBottom:12 }}>🎵</div>
              <p style={{ fontSize:16, color:"#6b7280" }}>No prospects yet.</p>
              <p style={{ fontSize:14, marginTop:4, color:"#9ca3af" }}>Click <strong style={{color:"#4f46e5"}}>+ Find clients</strong> to get started.</p>
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {prospects.map(p=>(
                <div key={p.id} onClick={()=>onSelectProspect(p)} style={{ background:"#fff", border:"2px solid #e5e7eb", borderRadius:10, padding:"14px 18px", cursor:"pointer", display:"grid", gridTemplateColumns:"1fr auto auto", gap:12, alignItems:"center", transition:"all 0.15s" }} onMouseEnter={e=>{e.currentTarget.style.borderColor="#4f46e5";e.currentTarget.style.boxShadow="0 2px 8px rgba(79,70,229,0.08)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#e5e7eb";e.currentTarget.style.boxShadow="none";}}>
                  <div>
                    <div style={{ fontWeight:700, color:"#111", fontSize:15 }}>{p.name}</div>
                    <div style={{ fontSize:12, color:"#9ca3af", marginTop:2 }}>{p.type} · {p.location}</div>
                  </div>
                  <StatusBadge status={p.status}/>
                  <div style={{ fontSize:12, color:"#d1d5db" }}>{p.date}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── Search ───────────────────────────────────────────────────────────────────
    function SearchView({ profile, onBack, onAddProspects }) {
      const [query,setQuery]     = useState("");
      const [loading,setLoading] = useState(false);
      const [results,setResults] = useState([]);
      const [selected,setSelected] = useState([]);
      const [error,setError]     = useState("");

      const search = async () => {
        if(!query.trim()) return;
        setLoading(true); setResults([]); setError(""); setSelected([]);
        try {
          const system = `${buildContext(profile)}\nSearch for advertising music prospects matching the user's query. Return ONLY a JSON array of 5-8 objects: { name, type ("Music House"|"Ad Agency"|"Brand"), location, website, contact (email or "—"), relevance (1 sentence) } Raw JSON only.`;
          const text = await callClaude([{role:"user",content:`Find prospects: "${query}"`}], system, true);
          setResults(JSON.parse(text));
        } catch { setError("Search failed. Check if API limit reached or format error."); }
        setLoading(false);
      };

      const toggle = i => setSelected(prev=>prev.includes(i)?prev.filter(x=>x!==i):[...prev,i]);
      const add    = () => onAddProspects(results.filter((_,i)=>selected.includes(i)).map(r=>({
        id:Date.now()+Math.random(), ...r, status:"New", notes:"", emails:[],
        date:new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"})
      })));

      return (
        <div style={{ maxWidth:680, margin:"0 auto", padding:"32px 24px" }}>
          <button onClick={onBack} style={S.ghost}>← Back</button>
          <div style={{ margin:"24px 0 28px" }}>
            <div style={{ fontSize:11, color:"#4f46e5", fontWeight:800, letterSpacing:"0.15em", marginBottom:8 }}>FIND CLIENTS</div>
            <h2 style={{ fontSize:26, fontWeight:800, color:"#111" }}>Search for prospects</h2>
          </div>
          <div style={{ display:"flex", gap:10, marginBottom:28 }}>
            <input style={{...S.input,flex:1}} value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()} placeholder='e.g. "music houses in NYC"'/>
            <button onClick={search} disabled={loading} style={S.primary}>{loading?"...":"Search"}</button>
          </div>
          {error && <p style={{color:"#dc2626",fontSize:14,marginBottom:16}}>{error}</p>}
          {loading && <div style={{textAlign:"center",padding:"48px 0",background:"#fff",borderRadius:12,border:"2px dashed #e5e7eb"}}><div style={{fontSize:24,marginBottom:8}}>🔍</div><p style={{fontSize:14,color:"#6b7280"}}>Searching...</p></div>}
          {results.length>0 && (
            <>
              <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
                {results.map((r,i)=>(
                  <div key={i} onClick={()=>toggle(i)} style={{ background:"#fff", border:`2px solid ${selected.includes(i)?"#4f46e5":"#e5e7eb"}`, borderRadius:10, padding:"14px 18px", cursor:"pointer" }}>
                    <div style={{display:"flex",justifyContent:"space-between",gap:12}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,color:"#111",fontSize:15}}>{r.name}</div>
                        <div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{r.type} · {r.location}</div>
                        <p style={{fontSize:13,color:"#4b5563",marginTop:8,lineHeight:1.5}}>{r.relevance}</p>
                      </div>
                      <div style={{ width:22,height:22,borderRadius:6,border:`2px solid ${selected.includes(i)?"#4f46e5":"#d1d5db"}`,background:selected.includes(i)?"#4f46e5":"#fff",display:"flex",alignItems:"center",justifyContent:"center" }}>
                        {selected.includes(i) && <span style={{fontSize:12,color:"#fff",fontWeight:800}}>✓</span>}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              {selected.length>0 && <button onClick={add} style={{...S.primary,width:"100%",padding:"13px"}}>Add {selected.length} prospect(s) →</button>}
            </>
          )}
        </div>
      );
    }

    // ─── Prospect ─────────────────────────────────────────────────────────────────
    function ProspectView({ prospect, profile, onBack, onUpdate, onCompose }) {
      const [p,setP] = useState(prospect);
      const save = updates => { const u={...p,...updates}; setP(u); onUpdate(u); };

      return (
        <div style={{ maxWidth:720, margin:"0 auto", padding:"32px 24px" }}>
          <button onClick={onBack} style={S.ghost}>← Back</button>
          <div style={{ margin:"24px 0 24px", display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:16 }}>
            <div>
              <div style={{ fontSize:11, color:"#4f46e5", fontWeight:800, letterSpacing:"0.15em", marginBottom:6 }}>{p.type?.toUpperCase()}</div>
              <h2 style={{ fontSize:26, fontWeight:800, color:"#111" }}>{p.name}</h2>
              <div style={{ fontSize:14, color:"#6b7280", marginTop:4 }}>{p.location}</div>
            </div>
            <button onClick={onCompose} style={S.primary}>✉ Write email</button>
          </div>
          <div style={{ marginBottom:24 }}>
            <label style={S.label}>Status</label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{STATUSES.map(s=><Chip key={s} label={s} active={p.status===s} onClick={()=>save({status:s})}/>)}</div>
          </div>
          {p.relevance && (
            <div style={{ background:"#f5f3ff", border:"1.5px solid #c4b5fd", borderRadius:10, padding:"14px 18px", marginBottom:14 }}>
              <div style={{ fontSize:11, color:"#7c3aed", fontWeight:700, letterSpacing:"0.08em", marginBottom:6 }}>WHY RELEVANT</div>
              <p style={{ fontSize:14, color:"#4b5563", lineHeight:1.6 }}>{p.relevance}</p>
            </div>
          )}
          <ResearchPanel prospect={p} profile={profile} />
          <div style={{ marginBottom:24 }}>
            <label style={S.label}>Notes</label>
            <textarea value={p.notes} onChange={e=>save({notes:e.target.value})} style={{...S.input,minHeight:100,resize:"vertical"}} placeholder="Add notes..."/>
          </div>
        </div>
      );
    }

    // ─── Compose ──────────────────────────────────────────────────────────────────
    function ComposeView({ prospect, profile, onBack, onSave }) {
      const [email,setEmail]   = useState("");
      const [loading,setLoading] = useState(true);

      const generate = async () => {
        setLoading(true);
        const system = `${buildContext(profile)}\nWrite a personal outreach email (max 180 words) to ${prospect.name}.\nStyle: ${profile.emailStyle||"personal, direct"}.\nNo subject line. No "I hope this finds you well". Sign off naturally.`;
        const text = await callClaude([{role:"user",content:`Write outreach email to: ${prospect.name} (${prospect.type}, ${prospect.location}). Why relevant: ${prospect.relevance}.`}], system);
        setEmail(text.trim()); setLoading(false);
      };

      useEffect(()=>{ generate(); },[]);

      return (
        <div style={{ maxWidth:680, margin:"0 auto", padding:"32px 24px" }}>
          <button onClick={onBack} style={S.ghost}>← Back</button>
          <div style={{ margin:"24px 0 24px" }}>
            <div style={{ fontSize:11, color:"#4f46e5", fontWeight:800, letterSpacing:"0.15em", marginBottom:8 }}>COMPOSE EMAIL</div>
            <h2 style={{ fontSize:24, fontWeight:800, color:"#111" }}>To: {prospect.name}</h2>
          </div>
          {loading ? (
            <div style={{ textAlign:"center", padding:"56px 0", background:"#fff", borderRadius:12, border:"2px dashed #e5e7eb" }}>
              <p style={{fontSize:14,color:"#6b7280"}}>Writing your email...</p>
            </div>
          ) : (
            <>
              <textarea value={email} onChange={e=>setEmail(e.target.value)} style={{...S.input,minHeight:280,resize:"vertical",fontSize:14,lineHeight:1.8,marginBottom:16}}/>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <button onClick={()=>onSave({body:email,date:new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})})} style={S.primary}>Save to prospect →</button>
                <button onClick={generate} style={S.ghost}>↺ Regenerate</button>
              </div>
            </>
          )}
        </div>
      );
    }

    // ─── Root ─────────────────────────────────────────────────────────────────────
    function App() {
      const [state,setState]           = useState(null);
      const [view,setView]             = useState(VIEWS.DASHBOARD);
      const [selectedProspect,setSelected] = useState(null);
      const [ready,setReady]           = useState(false);

      useEffect(()=>{
        storageGet(STORAGE_KEY).then(saved=>{
          setState(saved||defaultState);
          setView(saved?.setupDone ? VIEWS.DASHBOARD : VIEWS.SETUP);
          setReady(true);
        });
      },[]);

      const persist = useCallback(async updates => {
        setState(prev=>{ const next={...prev,...updates}; storageSet(STORAGE_KEY,next); return next; });
      },[]);

      const saveProfile  = p  => { persist({profile:p,setupDone:true}); setView(VIEWS.DASHBOARD); };
      const addProspects = list => { persist({prospects:[...(state.prospects||[]),...list]}); setView(VIEWS.DASHBOARD); };
      const updateProspect = u => { persist({prospects:state.prospects.map(p=>p.id===u.id?u:p)}); setSelected(u); };
      const saveEmail    = obj => { const u={...selectedProspect,emails:[...(selectedProspect.emails||[]),obj],status:"Emailed"}; updateProspect(u); setView(VIEWS.PROSPECT); };

      if(!ready||!state) return <div style={{textAlign:"center", marginTop:"50px"}}>Loading...</div>;

      const currentProspect = (view===VIEWS.PROSPECT||view===VIEWS.COMPOSE)?selectedProspect:null;

      return (
        <div style={{ minHeight:"100vh", background:"#f3f4f6", color:"#111", fontFamily:"sans-serif" }}>
          <style>{`* { box-sizing:border-box; margin:0; padding:0; } input:focus,textarea:focus { border-color:#4f46e5 !important; outline:none; } button:active { opacity:0.85; } a:hover { opacity:0.8; }`}</style>
          
          {state.setupDone && (
            <div style={{ background:"#fff", borderBottom:"1.5px solid #e5e7eb", padding:"0 24px", display:"flex", alignItems:"center", height:56 }}>
              <span style={{ fontSize:15, fontWeight:800, color:"#4f46e5", marginRight:24 }}>Soundboard</span>
              <div style={{display:"flex",gap:2}}>
                {[{label:"Dashboard",v:VIEWS.DASHBOARD},{label:"Find clients",v:VIEWS.SEARCH}].map(({label,v})=>(
                  <button key={v} onClick={()=>setView(v)} style={{ background:"transparent", border:"none", cursor:"pointer", fontFamily:"inherit", fontSize:14, fontWeight:600, padding:"0 14px", height:56, color:view===v?"#4f46e5":"#6b7280", borderBottom:view===v?"2px solid #4f46e5":"2px solid transparent", transition:"all 0.15s" }}>{label}</button>
                ))}
              </div>
            </div>
          )}

          {view===VIEWS.SETUP     && <SetupView profile={state.profile} onSave={saveProfile}/>}
          {view===VIEWS.DASHBOARD && <DashboardView prospects={state.prospects} profile={state.profile} onSearch={()=>setView(VIEWS.SEARCH)} onSelectProspect={p=>{setSelected(p);setView(VIEWS.PROSPECT);}} onEditProfile={()=>setView(VIEWS.SETUP)}/>}
          {view===VIEWS.SEARCH    && <SearchView profile={state.profile} onBack={()=>setView(VIEWS.DASHBOARD)} onAddProspects={addProspects}/>}
          {view===VIEWS.PROSPECT  && selectedProspect && <ProspectView prospect={selectedProspect} profile={state.profile} onBack={()=>setView(VIEWS.DASHBOARD)} onUpdate={updateProspect} onCompose={()=>setView(VIEWS.COMPOSE)}/>}
          {view===VIEWS.COMPOSE   && selectedProspect && <ComposeView prospect={selectedProspect} profile={state.profile} onBack={()=>setView(VIEWS.PROSPECT)} onSave={saveEmail}/>}
          {state.setupDone && <ChatAssistant profile={state.profile} prospect={currentProspect}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
