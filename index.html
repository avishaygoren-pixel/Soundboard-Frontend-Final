<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundboard CRM</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const STORAGE_KEY = "soundboard_crm_v4";
    const BACKEND_URL = "https://soundboard-backend-final.onrender.com/api/chat";

    async function callClaude(userText) {
      console.log("Attempting to talk to backend at:", BACKEND_URL);
      try {
        const res = await fetch(BACKEND_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userText })
        });
        
        if (!res.ok) throw new Error(`Server responded with ${res.status}`);
        
        const data = await res.json();
        console.log("Raw data received:", data);
        
        // Strip markdown and return
        return (data.reply || "").replace(/```json|```/g, "").trim();
      } catch (err) {
        console.error("FETCH ERROR:", err);
        return "ERROR";
      }
    }

    function SetupView({ onSave }) {
      const [n, setN] = useState("");
      return (
        <div style={{ padding: 50, textAlign: 'center' }}>
          <h2>Welcome</h2>
          <input placeholder="Your Name" onChange={e => setN(e.target.value)} style={{padding:10, marginBottom:10}} /><br/>
          <button onClick={() => onSave(n)} style={{padding:10, background:'#4f46e5', color:'#fff', border:'none', borderRadius:5}}>Start</button>
        </div>
      );
    }

    function App() {
      const [state, setState] = useState({ name: "", prospects: [], setup: false });
      const [view, setView] = useState("DASHBOARD");
      const [query, setQuery] = useState("");
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [sel, setSel] = useState(null);

      useEffect(() => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) setState(JSON.parse(saved));
      }, []);

      const save = (next) => { setState(next); localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); };

      const handleSearch = async () => {
        setLoading(true);
        console.log("Searching for:", query);
        const prompt = `Find 5 ad agencies or music houses in ${query}. Return ONLY a JSON array: [{"name":"","location":"","relevance":""}]`;
        const res = await callClaude(prompt);
        
        if (res === "ERROR") {
            alert("The connection failed. Check your browser console (Right-click > Inspect > Console).");
        } else {
            try { setResults(JSON.parse(res)); } catch(e) { console.error("Parse Error:", e); }
        }
        setLoading(false);
      };

      if (!state.setup) return <SetupView onSave={n => save({...state, name:n, setup:true})} />;

      if (view === "SEARCH") return (
        <div style={{ padding: 40 }}>
          <button onClick={() => setView("DASHBOARD")}>Back</button>
          <div style={{ margin: '20px 0' }}>
            <input value={query} onChange={e => setQuery(e.target.value)} placeholder="City..." style={{padding:10, width:200}} />
            <button onClick={handleSearch} style={{padding:10}}>{loading ? "..." : "Search"}</button>
          </div>
          {results.map((r, i) => (
            <div key={i} style={{ border: '1px solid #ccc', padding: 15, marginBottom: 10 }}>
              <strong>{r.name}</strong><br/>
              <button onClick={() => { save({...state, prospects: [...state.prospects, {...r, id: Date.now()+i}]}); setView("DASHBOARD"); }}>+ Add</button>
            </div>
          ))}
        </div>
      );

      if (view === "PROSPECT") return (
        <div style={{ padding: 40 }}>
          <button onClick={() => setView("DASHBOARD")}>Back</button>
          <h1>{sel.name}</h1>
          <div style={{ background: '#f0fdf4', padding: 20, marginTop: 20 }}>
            <h3>AI INSIGHTS</h3>
            <p>Click "Write Email" to generate outreach.</p>
          </div>
        </div>
      );

      return (
        <div style={{ padding: 40 }}>
          <h1>Hey {state.name}</h1>
          <button onClick={() => setView("SEARCH")} style={{padding:10, background:'#4f46e5', color:'#fff', border:'none', margin:'20px 0'}}>+ Find Clients</button>
          {state.prospects.map(p => (
            <div key={p.id} onClick={() => { setSel(p); setView("PROSPECT"); }} style={{ padding: 20, border: '1px solid #ddd', cursor: 'pointer', marginBottom: 10 }}>
              {p.name} ({p.location})
            </div>
          ))}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
